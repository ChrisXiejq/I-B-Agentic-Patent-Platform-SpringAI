server:
  port: 8190

# 可选：RAG 建索引默认 PDF 目录（与 LLM base/patent_pdfs 对齐时可填）
app:
  rag:
    pdf-dir: ${RAG_PDF_DIR:}
    top-k: 5
    recall-per-path: 10
    rrf-k: 60
    rerank-enabled: false
    # Weaviate hybrid 检索时向量与 BM25 权重，0.5 为均等
    hybrid-alpha: 0.5
  # Agent：模型可改为 gpt-4o；分层记忆短期轮数；可选 MCP 远程工具
  agent:
    model: ${AGENT_MODEL:qwen-plus}
    memory:
      short-term-turns: 10
      long-term-top-k: 5
    # MCP：启用后 Agent 可路由到独立 MCP Server（RAG/业务 API）
    mcp:
      enabled: false
      server-url: ${MCP_SERVER_URL:http://localhost:8091/mcp}
      tool-names: rag_search,patent_search

