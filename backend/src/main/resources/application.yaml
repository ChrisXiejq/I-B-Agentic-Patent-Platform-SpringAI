server:
  port: 8190
  servlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  tags-sorter: alpha
  operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: '/**'
      packages-to-scan: com.inovationbehavior.backend.controller

# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchAPI（若使用搜索 API，在此填写 key）
# search-api:
#   api-key: 你的 API Key

# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG
